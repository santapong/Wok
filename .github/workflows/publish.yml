name: Publish to PyPI

# Publishes wok-lang when a GitHub release is published.
# Uses PyPI Trusted Publishing (OIDC) — no API token to manage.
# One-time setup on pypi.org: project wok-lang -> Publishing ->
# add GitHub publisher (owner: santapong, repo: Wok,
# workflow: publish.yml, environment: pypi).

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          pip install build
          python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1
