name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    name: pytest (py${{ matrix.python }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.12", "3.13"]
    env:
      # Rich prints emoji; keep Windows consoles on UTF-8.
      PYTHONUTF8: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: pip install -e '.[dev]'
      - name: Test
        run: pytest -q
      - name: Run the example recipes
        shell: bash
        run: |
          wok --version
          for r in recipes/*.wok; do wok run "$r"; done
